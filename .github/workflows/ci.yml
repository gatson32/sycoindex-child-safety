name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run tests
        run: node test/api.test.js
      - name: Check API endpoints exist
        run: |
          for f in api/score.js api/leaderboard.js api/model.js api/verify.js api/keys.js api/waitlist.js api/submit.js; do
            test -f "$f" || (echo "MISSING: $f" && exit 1)
          done
          echo "All 7 API endpoints present"
